<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAF7F0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Journal">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Journal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #FAF7F0;
      --paper-dark: #F0EBE0;
      --ink: #1a1a1a;
      --spine: #6b5545;
      --spine-hi: #8a7060;
      --line-blue: rgba(150,180,220,0.35);
      --line-red: rgba(220,80,80,0.22);
      --ui-bg: rgba(255,255,255,0.85);
      --ui-border: rgba(0,0,0,0.1);
      --ui-text: #444;
      --ui-muted: #888;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #2a2620;
        --paper-dark: #221f1a;
        --ink: #e8e2d8;
        --ui-bg: rgba(40,38,32,0.92);
        --ui-border: rgba(255,255,255,0.12);
        --ui-text: #ccc;
        --ui-muted: #888;
      }
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--paper-dark);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: none;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--ui-bg);
      border-bottom: 1px solid var(--ui-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
      z-index: 10;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #toolbar::-webkit-scrollbar { display: none; }

    #journal-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
      position: relative;
    }

    #journal-book {
      display: flex;
      height: 100%;
      max-height: 640px;
      width: 100%;
      max-width: 800px;
      border-radius: 3px 8px 8px 3px;
      box-shadow:
        -2px 0 6px rgba(0,0,0,0.12),
        4px 6px 32px rgba(0,0,0,0.22),
        0 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    #spine {
      width: 22px;
      flex-shrink: 0;
      background: linear-gradient(90deg, #4a3828 0%, var(--spine-hi) 45%, var(--spine) 100%);
      border-right: 1px solid rgba(0,0,0,0.2);
      position: relative;
    }
    #spine::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 18px,
        rgba(0,0,0,0.06) 18px,
        rgba(0,0,0,0.06) 19px
      );
    }

    #page-container {
      flex: 1;
      position: relative;
      background: var(--paper);
      overflow: hidden;
    }

    #page-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    #draw-canvas {
      position: absolute;
      inset: 0;
      touch-action: none;
      z-index: 1;
      cursor: crosshair;
    }

    /* page turn flash overlay */
    #turn-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, transparent 100%);
      transition: none;
    }
    #turn-overlay.flash-right {
      animation: flashRight 0.28s ease-out forwards;
    }
    #turn-overlay.flash-left {
      background: linear-gradient(270deg, rgba(255,255,255,0.6) 0%, transparent 100%);
      animation: flashRight 0.28s ease-out forwards;
    }
    @keyframes flashRight {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    /* ── Toolbar buttons ─────────────────────────────────── */
    .tool-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--ui-border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: var(--ui-text);
      transition: background 0.12s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-btn:hover { background: rgba(0,0,0,0.06); }
    .tool-btn.active {
      background: var(--ink);
      color: var(--paper);
      border-color: transparent;
    }
    .tool-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .sep {
      width: 1px; height: 22px;
      background: var(--ui-border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    #color-picker-wrap {
      position: relative;
      width: 28px; height: 28px; flex-shrink: 0;
    }
    #color-swatch {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--ui-border);
      background: #1a1a1a;
      cursor: pointer;
    }
    #color-input {
      opacity: 0; position: absolute; inset: 0;
      cursor: pointer; width: 100%; height: 100%;
      border: none; padding: 0;
    }

    #size-slider {
      width: 80px; flex-shrink: 0;
      accent-color: var(--ink);
    }

    #page-label {
      font-size: 12px;
      color: var(--ui-muted);
      font-style: italic;
      white-space: nowrap;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── Nav buttons on page ─────────────────────────────── */
    #page-nav {
      position: absolute;
      bottom: 14px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
      z-index: 4;
    }
    .nav-btn {
      pointer-events: all;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--ui-border);
      background: var(--ui-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ui-text);
      font-size: 18px;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.97); }
    .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,28,24,0.88);
      color: #f0ebe0;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Thumbnail strip ─────────────────────────────────── */
    #thumb-panel {
      position: fixed;
      top: 0; right: 0;
      width: 140px; height: 100%;
      background: var(--ui-bg);
      backdrop-filter: blur(12px);
      border-left: 1px solid var(--ui-border);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 20;
      overflow-y: auto;
      padding: 48px 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      scrollbar-width: thin;
    }
    #thumb-panel.open { transform: translateX(0); }

    .thumb-item {
      width: 100px; flex-shrink: 0;
      border: 2px solid transparent;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--paper);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .thumb-item.active-thumb { border-color: var(--spine); }
    .thumb-item canvas { width: 100%; display: block; }
    .thumb-num {
      position: absolute;
      bottom: 3px; right: 5px;
      font-size: 9px;
      color: var(--ui-muted);
    }

    #thumb-close {
      position: absolute;
      top: 10px; right: 10px;
      background: none; border: none;
      cursor: pointer; color: var(--ui-text);
      font-size: 20px;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <!-- Pen -->
    <button class="tool-btn active" id="btn-pen" title="Pen">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7-3-3-7 7v3h3z"/><path d="M16 5l3 3"/><path d="M5 21l-1-4"/></svg>
    </button>
    <!-- Eraser -->
    <button class="tool-btn" id="btn-eraser" title="Eraser">
      <svg viewBox="0 0 24 24"><rect x="2" y="14" width="20" height="6" rx="1"/><path d="M6.5 14L12 5l5.5 9"/></svg>
    </button>
    <!-- Highlighter -->
    <button class="tool-btn" id="btn-highlighter" title="Highlighter">
      <svg viewBox="0 0 24 24"><path d="M9 3l6 0 4 8-10 0-4-8z"/><rect x="7" y="11" width="10" height="6" rx="1"/><path d="M11 17v4"/><path d="M13 17v4"/></svg>
    </button>

    <div class="sep"></div>

    <!-- Color -->
    <div id="color-picker-wrap" title="Color">
      <div id="color-swatch"></div>
      <input type="color" id="color-input" value="#1a1a1a">
    </div>

    <!-- Size -->
    <input type="range" id="size-slider" min="1" max="20" value="2" step="0.5" title="Brush size">

    <div class="sep"></div>

    <!-- Clear page -->
    <button class="tool-btn" id="btn-clear" title="Clear page">
      <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
    </button>
    <!-- Pages strip -->
    <button class="tool-btn" id="btn-thumbs" title="All pages">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="9" rx="1"/><rect x="3" y="15" width="7" height="6" rx="1"/><rect x="14" y="15" width="7" height="6" rx="1"/></svg>
    </button>
    <!-- Export -->
    <button class="tool-btn" id="btn-export" title="Export page as PNG">
      <svg viewBox="0 0 24 24"><path d="M12 3v13"/><path d="M8 12l4 4 4-4"/><path d="M3 20h18"/></svg>
    </button>

    <span id="page-label">Page 1</span>
  </div>

  <div id="journal-wrap">
    <div id="journal-book">
      <div id="spine"></div>
      <div id="page-container">
        <svg id="page-lines" xmlns="http://www.w3.org/2000/svg"></svg>
        <canvas id="draw-canvas"></canvas>
        <div id="turn-overlay"></div>
        <div id="page-nav">
          <button class="nav-btn" id="btn-prev" title="Previous page">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="nav-btn" id="btn-next" title="Next page">
            <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Thumbnail panel -->
<div id="thumb-panel">
  <button id="thumb-close" title="Close">✕</button>
  <div id="thumb-list"></div>
</div>

<div id="toast"></div>

<script>
(function() {
  'use strict';

  // ── State ───────────────────────────────────────────────
  const DB_NAME = 'journal_db';
  const DB_VER = 1;
  const STORE = 'pages';

  let db = null;
  let currentPage = 0;
  let pages = {}; // cache: pageIndex -> dataURL
  let tool = 'pen';
  let penColor = '#1a1a1a';
  let penSize = 2;
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let pendingSave = null;
  let thumbPanelOpen = false;

  // ── Elements ────────────────────────────────────────────
  const canvas = document.getElementById('draw-canvas');
  const ctx = canvas.getContext('2d');
  const svgLines = document.getElementById('page-lines');
  const pageLabel = document.getElementById('page-label');
  const colorInput = document.getElementById('color-input');
  const colorSwatch = document.getElementById('color-swatch');
  const sizeSlider = document.getElementById('size-slider');
  const turnOverlay = document.getElementById('turn-overlay');
  const thumbPanel = document.getElementById('thumb-panel');
  const thumbList = document.getElementById('thumb-list');
  const pageContainer = document.getElementById('page-container');

  // ── IndexedDB ───────────────────────────────────────────
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: 'id' });
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGet(id) {
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result ? req.result.data : null);
      req.onerror = () => resolve(null);
    });
  }

  function dbPut(id, data) {
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put({ id, data });
      tx.oncomplete = resolve;
      tx.onerror = resolve;
    });
  }

  function dbDelete(id) {
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = resolve;
    });
  }

  function dbGetAllKeys() {
    return new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  }

  // ── Canvas setup ────────────────────────────────────────
  function setCanvasSize() {
    const rect = pageContainer.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    drawRuledLines(rect.width, rect.height);
  }

  function drawRuledLines(w, h) {
    svgLines.innerHTML = '';
    svgLines.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svgLines.style.width = w + 'px';
    svgLines.style.height = h + 'px';

    const lineGap = 30;
    const marginTop = 50;

    for (let y = marginTop; y < h - 24; y += lineGap) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', '0'); line.setAttribute('x2', w);
      line.setAttribute('y1', y); line.setAttribute('y2', y);
      line.setAttribute('stroke', 'var(--line-blue)');
      line.setAttribute('stroke-width', '0.8');
      svgLines.appendChild(line);
    }
    const redLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    redLine.setAttribute('x1', '56'); redLine.setAttribute('x2', '56');
    redLine.setAttribute('y1', '0'); redLine.setAttribute('y2', h);
    redLine.setAttribute('stroke', 'var(--line-red)');
    redLine.setAttribute('stroke-width', '1');
    svgLines.appendChild(redLine);
  }

  // ── Page load / save ────────────────────────────────────
  async function loadPage(idx) {
    const rect = pageContainer.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);

    let dataURL = pages[idx];
    if (!dataURL) {
      dataURL = await dbGet(idx);
      if (dataURL) pages[idx] = dataURL;
    }

    if (dataURL) {
      await new Promise(resolve => {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, rect.width, rect.height); resolve(); };
        img.onerror = resolve;
        img.src = dataURL;
      });
    }
    pageLabel.textContent = `Page ${idx + 1}`;
  }

  function scheduleSave() {
    if (pendingSave) clearTimeout(pendingSave);
    pendingSave = setTimeout(() => { savePage(currentPage); }, 600);
  }

  async function savePage(idx) {
    const rect = pageContainer.getBoundingClientRect();
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const hasContent = data.some(v => v !== 0);
    if (hasContent) {
      const url = canvas.toDataURL('image/png');
      pages[idx] = url;
      await dbPut(idx, url);
    } else {
      delete pages[idx];
      await dbDelete(idx);
    }
  }

  // ── Drawing ─────────────────────────────────────────────
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top,
      pressure: e.pressure > 0 ? e.pressure : 0.5
    };
  }

  function applyTool(pos) {
    if (tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = penSize * 8;
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.globalAlpha = 1;
    } else if (tool === 'highlighter') {
      ctx.globalCompositeOperation = 'multiply';
      ctx.lineWidth = penSize * 10;
      ctx.strokeStyle = penColor;
      ctx.globalAlpha = 0.35;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.lineWidth = Math.max(0.5, penSize * (0.5 + pos.pressure * 0.8));
      ctx.strokeStyle = penColor;
      ctx.globalAlpha = 1;
    }
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  canvas.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') return;
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
  }, { passive: false });

  canvas.addEventListener('pointermove', e => {
    if (!isDrawing || e.pointerType === 'touch') return;
    e.preventDefault();
    const pos = getPos(e);

    // Use getCoalescedEvents for smoother lines if available
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ev of events) {
      const p = getPos(ev);
      applyTool(p);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lastX = p.x; lastY = p.y;
    }
    scheduleSave();
  }, { passive: false });

  canvas.addEventListener('pointerup', e => {
    if (!isDrawing) return;
    isDrawing = false;
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    scheduleSave();
  });

  canvas.addEventListener('pointercancel', () => {
    isDrawing = false;
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  });

  // ── Touch gestures (finger swipe = page turn) ───────────
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  canvas.addEventListener('touchend', async e => {
    if (!e.changedTouches.length) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    const dt = Date.now() - touchStartTime;
    if (Math.abs(dx) > 55 && dy < 90 && dt < 500) {
      if (dx < 0) await flipPage(1);
      else await flipPage(-1);
    }
  }, { passive: true });

  async function flipPage(dir) {
    if (dir === -1 && currentPage === 0) return;
    await savePage(currentPage);
    turnOverlay.classList.remove('flash-right', 'flash-left');
    void turnOverlay.offsetWidth;
    turnOverlay.classList.add(dir === 1 ? 'flash-right' : 'flash-left');
    currentPage += dir;
    await loadPage(currentPage);
  }

  document.getElementById('btn-next').addEventListener('click', () => flipPage(1));
  document.getElementById('btn-prev').addEventListener('click', () => flipPage(-1));

  // ── Toolbar ─────────────────────────────────────────────
  function setTool(t) {
    tool = t;
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.tool-btn[data-tool="${t}"]`);
    if (btn) btn.classList.add('active');
  }

  document.getElementById('btn-pen').dataset.tool = 'pen';
  document.getElementById('btn-eraser').dataset.tool = 'eraser';
  document.getElementById('btn-highlighter').dataset.tool = 'highlighter';
  document.getElementById('btn-pen').classList.add('active');

  document.getElementById('btn-pen').addEventListener('click', () => setTool('pen'));
  document.getElementById('btn-eraser').addEventListener('click', () => setTool('eraser'));
  document.getElementById('btn-highlighter').addEventListener('click', () => setTool('highlighter'));

  colorInput.addEventListener('input', () => {
    penColor = colorInput.value;
    colorSwatch.style.background = penColor;
  });
  colorSwatch.style.background = penColor;

  sizeSlider.addEventListener('input', () => { penSize = parseFloat(sizeSlider.value); });

  document.getElementById('btn-clear').addEventListener('click', async () => {
    const rect = pageContainer.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    delete pages[currentPage];
    await dbDelete(currentPage);
    toast('Page cleared');
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    // Composite: paper bg + drawing
    const rect = pageContainer.getBoundingClientRect();
    const exp = document.createElement('canvas');
    exp.width = canvas.width;
    exp.height = canvas.height;
    const ectx = exp.getContext('2d');
    ectx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--paper').trim() || '#FAF7F0';
    ectx.fillRect(0, 0, exp.width, exp.height);
    ectx.drawImage(canvas, 0, 0);
    const link = document.createElement('a');
    link.download = `journal-page-${currentPage + 1}.png`;
    link.href = exp.toDataURL('image/png');
    link.click();
    toast('Page exported');
  });

  // ── Thumbnails ──────────────────────────────────────────
  document.getElementById('btn-thumbs').addEventListener('click', async () => {
    thumbPanelOpen = !thumbPanelOpen;
    thumbPanel.classList.toggle('open', thumbPanelOpen);
    if (thumbPanelOpen) await renderThumbs();
  });
  document.getElementById('thumb-close').addEventListener('click', () => {
    thumbPanelOpen = false;
    thumbPanel.classList.remove('open');
  });

  async function renderThumbs() {
    thumbList.innerHTML = '';
    const keys = await dbGetAllKeys();
    const allPages = new Set([...keys, currentPage]);
    const sorted = [...allPages].sort((a, b) => a - b);

    // Add a blank new page at the end
    const maxPage = sorted.length ? Math.max(...sorted) : 0;
    sorted.push(maxPage + 1);

    for (const idx of sorted) {
      const item = document.createElement('div');
      item.className = 'thumb-item' + (idx === currentPage ? ' active-thumb' : '');

      const tc = document.createElement('canvas');
      tc.width = 100; tc.height = 70;
      const tctx = tc.getContext('2d');
      tctx.fillStyle = '#FAF7F0';
      tctx.fillRect(0, 0, 100, 70);

      const dataURL = pages[idx] || await dbGet(idx);
      if (dataURL) {
        await new Promise(r => {
          const img = new Image();
          img.onload = () => { tctx.drawImage(img, 0, 0, 100, 70); r(); };
          img.onerror = r;
          img.src = dataURL;
        });
      }

      const numEl = document.createElement('span');
      numEl.className = 'thumb-num';
      numEl.textContent = idx + 1;

      item.appendChild(tc);
      item.appendChild(numEl);
      item.addEventListener('click', async () => {
        await savePage(currentPage);
        currentPage = idx;
        await loadPage(currentPage);
        thumbPanelOpen = false;
        thumbPanel.classList.remove('open');
      });
      thumbList.appendChild(item);
    }
  }

  // ── Toast ────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── Service worker ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── Keyboard shortcuts ───────────────────────────────────
  document.addEventListener('keydown', async e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); await flipPage(1); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); await flipPage(-1); }
    if (e.key === 'p' || e.key === 'P') setTool('pen');
    if (e.key === 'e' || e.key === 'E') setTool('eraser');
    if (e.key === 'h' || e.key === 'H') setTool('highlighter');
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      toast('Undo coming soon — save often!');
    }
  });

  // ── Init ─────────────────────────────────────────────────
  async function init() {
    db = await openDB();
    setCanvasSize();
    await loadPage(0);

    window.addEventListener('resize', async () => {
      await savePage(currentPage);
      setCanvasSize();
      await loadPage(currentPage);
    });
  }

  init();
})();
</script>
</body>
</html>

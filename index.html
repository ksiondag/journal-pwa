<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAF7F0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Journal">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Journal</title>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <!-- Pen -->
    <button class="tool-btn active" id="btn-pen" title="Pen">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7-3-3-7 7v3h3z"/><path d="M16 5l3 3"/><path d="M5 21l-1-4"/></svg>
    </button>
    <!-- Pencil -->
    <button class="tool-btn" id="btn-pencil" title="Pencil">
      <svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/><path d="M15 5l4 4"/></svg>
    </button>
    <!-- Eraser -->
    <button class="tool-btn" id="btn-eraser" title="Eraser">
      <svg viewBox="0 0 24 24"><rect x="2" y="14" width="20" height="6" rx="1"/><path d="M6.5 14L12 5l5.5 9"/></svg>
    </button>
    <!-- Highlighter -->
    <button class="tool-btn" id="btn-highlighter" title="Highlighter">
      <svg viewBox="0 0 24 24"><path d="M9 3l6 0 4 8-10 0-4-8z"/><rect x="7" y="11" width="10" height="6" rx="1"/><path d="M11 17v4"/><path d="M13 17v4"/></svg>
    </button>

    <div class="sep"></div>

    <!-- Color -->
    <div id="color-picker-wrap" title="Color">
      <div id="color-swatch"></div>
      <input type="color" id="color-input" value="#1a1a1a">
    </div>

    <!-- Size -->
    <input type="range" id="size-slider" min="1" max="20" value="2" step="0.5" title="Brush size">

    <div class="sep"></div>

    <!-- Clear page -->
    <button class="tool-btn" id="btn-clear" title="Clear page">
      <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
    </button>
    <!-- Spread view -->
    <button class="tool-btn" id="btn-spread" title="Spread view">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>
    </button>
    <!-- Reset view -->
    <button class="tool-btn" id="btn-reset-view" title="Reset view (fit)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
    </button>
    <!-- Lock rotation -->
    <button class="tool-btn" id="btn-lock-rotation" title="Lock rotation">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </button>
    <!-- Pages strip -->
    <button class="tool-btn" id="btn-thumbs" title="All pages">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="9" rx="1"/><rect x="3" y="15" width="7" height="6" rx="1"/><rect x="14" y="15" width="7" height="6" rx="1"/></svg>
    </button>
    <!-- Import image -->
    <input type="file" id="import-input" accept="image/*" style="display:none">
    <button class="tool-btn" id="btn-import" title="Import image onto page">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>
    </button>
    <!-- Export -->
    <button class="tool-btn" id="btn-export" title="Export page as PNG">
      <svg viewBox="0 0 24 24"><path d="M12 3v13"/><path d="M8 12l4 4 4-4"/><path d="M3 20h18"/></svg>
    </button>
    <!-- Backup journal -->
    <button class="tool-btn" id="btn-backup" title="Backup journal (export all pages)">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="8" ry="2.5"/><path d="M4 6v5c0 1.38 3.58 2.5 8 2.5s8-1.12 8-2.5V6"/><path d="M12 16v4"/><path d="M9 18l3 2 3-2"/></svg>
    </button>
    <!-- Restore journal -->
    <input type="file" id="restore-input" accept="application/json,.json" style="display:none">
    <button class="tool-btn" id="btn-restore" title="Restore journal (import all pages)">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="8" ry="2.5"/><path d="M4 6v5c0 1.38 3.58 2.5 8 2.5s8-1.12 8-2.5V6"/><path d="M12 22v-4"/><path d="M9 20l3-2 3 2"/></svg>
    </button>

    <div class="sep"></div>

    <button class="tool-btn" id="btn-prev" title="Previous page">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span id="page-label">Page 1</span>
    <button class="tool-btn" id="btn-next" title="Next page">
      <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div id="journal-wrap">
    <div id="journal-book">
      <div id="page-left">
        <svg id="page-lines-left" xmlns="http://www.w3.org/2000/svg"></svg>
        <canvas id="canvas-left"></canvas>
      </div>
      <div id="spine"></div>
      <div id="page-container">
        <svg id="page-lines" xmlns="http://www.w3.org/2000/svg"></svg>
        <canvas id="draw-canvas"></canvas>
        <div id="turn-overlay"></div>
      </div>
    </div>
  </div>
</div>

<!-- Thumbnail panel -->
<div id="thumb-panel">
  <button id="thumb-close" title="Close">✕</button>
  <div id="thumb-list"></div>
</div>

<div id="toast"></div>
<div id="cursor-ring"></div>

<script src="app.js"></script>
</body>
</html>
